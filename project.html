<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project | LX Studio</title>
    <link rel="stylesheet" href="styles.css?v=20260612-refresh" />
  </head>
  <body>
    <header class="site-header" aria-label="Site navigation">
      <a class="brand-mark" href="index.html#top" aria-label="Hakuna home">
        <img src="首页素材/site-logo.svg?v=20260612-refresh" alt="" />
        <span data-zh="首页" data-en="Home">首页</span>
      </a>
      <nav class="nav-links" aria-label="Primary">
        <a href="works.html" data-zh="全部作品" data-en="All Works">全部作品</a>
        <a href="about.html" data-zh="简历" data-en="Resume">简历</a>

      <button class="language-toggle" type="button" aria-label="Switch language">
        <span data-lang-option="zh">中</span>

      </button>

    <main class="project-page" id="project-page">
      <a class="back-link" href="index.html#work" data-zh="返回作品" data-en="Back to work">返回作品</a>

        <div>
          <p class="project-meta" id="project-meta"></p>
          <h1 id="project-title"></h1>
        </div>
        <div class="project-intro">
          <p id="project-summary"></p>
          <dl class="project-facts">
            <div>
              <dt data-zh="范围" data-en="Scope">范围</dt>
              <dd id="project-scope"></dd>
            </div>
            <div>
              <dt data-zh="角色" data-en="Role">角色</dt>
              <dd id="project-role"></dd>
            </div>
          </dl>
        </div>
      </section>

      <div class="project-gallery" id="project-gallery"></div>

      <a class="next-project" id="next-project" href="#">
        <span data-zh="下一个项目" data-en="Next project">下一个项目</span>
        <strong></strong>
        <b aria-hidden="true">→</b>
      </a>
    </main>

    <script src="data.js?v=20260612-refresh"></script>
    <script src="script.js?v=20260612-refresh"></script>
