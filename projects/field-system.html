          <h1 id="project-title">Field System</h1>
        </div>
        <div class="project-intro">
          <p
            data-zh="为文化项目建立的弹性视觉身份，以模块场域、克制字体与可生产的色彩逻辑组成。"
            data-en="A flexible identity for a cultural program, built from modular fields, restrained typography, and a production-ready color logic."
          >
            为文化项目建立的弹性视觉身份，以模块场域、克制字体与可生产的色彩逻辑组成。
          </p>
          <dl class="project-facts">
            <div><dt data-zh="范围" data-en="Scope">范围</dt><dd data-zh="品牌识别、海报系统、数字发布" data-en="Identity, poster system, digital launch">品牌识别、海报系统、数字发布</dd></div>
            <div><dt data-zh="角色" data-en="Role">角色</dt><dd data-zh="设计指导、视觉系统、落地延展" data-en="Design direction, visual system, rollout">设计指导、视觉系统、落地延展</dd></div>
          </dl>
        </div>
      </section>

      <div class="project-cover">
        <img src="../assets/field-system.svg" alt="Field System artwork" />
      </div>

      <section class="project-body">
        <h2 data-zh="从一个规则长出整套视觉。" data-en="One rule, many visual outcomes.">从一个规则长出整套视觉。</h2>
        <p
          data-zh="项目核心是让传播材料在不同尺寸与媒介中保持一致的识别度。页面、海报和数字画面都从同一套网格和色块比例出发，因此能快速扩展，也方便后续团队维护。"
          data-en="The system keeps recognition consistent across sizes and media. Pages, posters, and digital frames all begin from the same grid and color-ratio logic, making the identity easy to expand and maintain."
        >
          项目核心是让传播材料在不同尺寸与媒介中保持一致的识别度。页面、海报和数字画面都从同一套网格和色块比例出发，因此能快速扩展，也方便后续团队维护。
        </p>
