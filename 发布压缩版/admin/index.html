<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Hakuna 内容管理</title>
    <style>
      body {
        margin: 0;
        background: #070707;
        color: #f7f4ea;
        font-family: Arial, Helvetica, sans-serif;
      }

      .cms-loading {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
        text-align: center;
      }

      .cms-loading strong {
        display: block;
        margin-bottom: 10px;
        font-size: 20px;
      }

      .cms-loading span {
        color: rgba(247, 244, 234, 0.68);
        font-size: 14px;
      }

      .cms-loading.is-error span {
        color: #ffb8a8;
      }

      .cms-loading a {
        display: inline-block;
        margin-top: 16px;
        color: #f7f4ea;
        font-weight: 700;
        text-decoration: underline;
        text-underline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <div class="cms-loading" id="cms-loading">
      <p>
        <strong>Hakuna 内容管理</strong>
        <span>后台加载中...</span>
      </p>
    </div>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      (() => {
        const liveAdminUrl = "https://hakunaworks.netlify.app/admin/";
        const loading = document.querySelector("#cms-loading");
        const setLoadingMessage = (message, isError = false, link = "") => {
          if (!loading) return;
          loading.classList.toggle("is-error", isError);
          loading.querySelector("span").textContent = message;
          const existingLink = loading.querySelector("a");
          if (existingLink) {
            existingLink.remove();
          }
          if (link) {
            const anchor = document.createElement("a");
            anchor.href = link;
            anchor.textContent = "打开线上后台";
            loading.querySelector("p").appendChild(anchor);
          }
        };

        if (window.location.protocol === "file:") {
          setLoadingMessage("CMS 后台不能通过本地文件直接打开，请使用线上后台。", true, liveAdminUrl);
          return;
        }

        const identity = window.netlifyIdentity;
        if (!identity) {
          setLoadingMessage("登录组件加载失败，请刷新页面重试。", true);
          return;
        }

        const tokenNames = [
          "invite_token",
          "recovery_token",
          "confirmation_token",
          "email_change_token",
          "access_token"
        ];
        const hash = window.location.hash.replace(/^#\/?/, "");
        const search = window.location.search.replace(/^\?/, "");
        const hasIdentityToken = tokenNames.some((name) => hash.includes(`${name}=`) || search.includes(`${name}=`));

        identity.on("init", () => {
          if (hasIdentityToken) {
            setLoadingMessage("正在打开账号设置窗口...");
            identity.open();
          }
        });

        identity.on("login", () => {
          window.location.href = "/admin/";
        });

        const loadScript = (sources, index = 0) => {
          const source = sources[index];
          if (!source) {
            setLoadingMessage("CMS 加载失败，请检查网络后刷新。", true);
            return;
          }

          const script = document.createElement("script");
          script.src = source;
          script.onload = () => {
            script.dataset.loaded = "true";
            setLoadingMessage("CMS 已加载，正在进入后台...");
          };
          script.onerror = () => loadScript(sources, index + 1);
          document.body.appendChild(script);
        };

        loadScript([
          "https://cdn.jsdelivr.net/npm/decap-cms@3.8.3/dist/decap-cms.js",
          "https://unpkg.com/decap-cms@3.8.3/dist/decap-cms.js"
        ]);
      })();
    </script>
  </body>
</html>
